llm:
  base_url: "http://127.0.0.1:1234/v1"
  api_key: "lm-studio"
  model: "qwen3-coder-30b-a3b-instruct-mlx"
  timeout_sec: 240

run:
  max_json_repair: 2
  max_fix_loops_total: 10
  max_fix_loops_per_task: 4
  verbose: true

profiles:
  enterprise:
    template_candidates:
      - "python_fastapi"
      - "python_cli"
    validators:
      - ruff
      - mypy
      - pytest
      - pip_audit
      - bandit
      - sbom
    security:
      audit_required: false
