<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoDev API Reference</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>AutoDev API Reference</h1>
      <div class="topbar-meta">
        <a class="topbar-link" href="/index.html">Back to GUI</a>
        <a class="topbar-link" href="/api/docs/routes" target="_blank" rel="noreferrer">JSON Catalog</a>
      </div>
    </header>

    <main class="docs-layout">
      <section class="docs-panel">
        <h2>Canonical Routes</h2>
        <p class="muted">
          This page renders from the machine-readable route catalog at <code>/api/docs/routes</code>. Saved compare
          snapshot item mutations should use the canonical <code>PATCH</code> and <code>DELETE</code> resource routes.
        </p>
      </section>

      <section id="apiReferenceContent" class="docs-panel">
        <div class="empty">Loading route catalog…</div>
      </section>
    </main>

    <script>
      function methodClass(method) {
        const normalized = String(method || '').trim().toLowerCase();
        if (normalized === 'post') return 'docs-method docs-method-post';
        if (normalized === 'patch') return 'docs-method docs-method-patch';
        if (normalized === 'delete') return 'docs-method docs-method-delete';
        return 'docs-method';
      }

      function escapeHtml(value) {
        return String(value ?? '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function renderRouteCard(route) {
        return `
          <article class="docs-route-card">
            <div class="docs-route-meta">
              <span class="${methodClass(route.method)}">${escapeHtml(route.method)}</span>
              <span class="docs-route-path">${escapeHtml(route.path)}</span>
            </div>
            <div>${escapeHtml(route.summary || '')}</div>
          </article>
        `;
      }

      function renderDeprecatedCard(route) {
        return `
          <article class="docs-route-card">
            <div class="docs-route-meta">
              <span class="${methodClass(route.method)}">${escapeHtml(route.method)}</span>
              <span class="docs-route-path">${escapeHtml(route.path)}</span>
            </div>
            <div>
              Deprecated helper. Use <code>${escapeHtml(route.canonical_method)} ${escapeHtml(route.canonical_path)}</code>.
            </div>
          </article>
        `;
      }

      async function loadApiReference() {
        const root = document.getElementById('apiReferenceContent');
        try {
          const response = await fetch('/api/docs/routes');
          if (!response.ok) {
            throw new Error(`/api/docs/routes -> ${response.status}`);
          }
          const payload = await response.json();
          const sections = Array.isArray(payload.sections) ? payload.sections : [];
          const deprecated = Array.isArray(payload.deprecated_routes) ? payload.deprecated_routes : [];

          root.innerHTML = `
            ${sections.map((section) => `
              <section class="docs-panel">
                <h3>${escapeHtml(section.name || 'Routes')}</h3>
                <div class="docs-route-list">
                  ${(Array.isArray(section.routes) ? section.routes : []).map(renderRouteCard).join('')}
                </div>
              </section>
            `).join('')}
            <section class="docs-panel">
              <h3>Deprecated Helpers</h3>
              <div class="docs-route-list">
                ${deprecated.map(renderDeprecatedCard).join('')}
              </div>
              <div class="docs-note">
                Legacy helper responses include deprecation metadata and canonical replacement guidance.
              </div>
            </section>
          `;
        } catch (error) {
          root.innerHTML = `<div class="empty error-text">Failed to load API reference: ${escapeHtml(error.message || error)}</div>`;
        }
      }

      loadApiReference();
    </script>
  </body>
</html>
