name: Quality Gates

on:
  push:
  pull_request:
  schedule:
    - cron: "17 2 * * *"

jobs:
  code-and-docs:
    runs-on: ubuntu-latest
    env:
      RELEASE_EVIDENCE_STRICT_SCHEMA: ${{ github.event_name == 'schedule' || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Fast code quality lane
        run: make ci-fast
      - name: Local-simple E2E smoke lane (NXT-007)
        run: make smoke-local-simple-e2e
      - name: Autonomous release-evidence smoke lane (AV3-001)
        run: make smoke-autonomous-e2e
      - name: Autonomous release-evidence gate (AV3-001/AV3-003)
        run: |
          if [ "${RELEASE_EVIDENCE_STRICT_SCHEMA}" = "true" ]; then
            echo "[AV3-003] strict schema mode enabled (--strict-schema)"
            make check-release-autonomous-strict
          else
            echo "[AV3-003] tolerant schema mode enabled (developer-friendly PR lane)"
            make check-release-autonomous
          fi
      - name: Docs-as-code sanity (markdown local links)
        run: make check-docs
      - name: Upload autonomous evidence artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: autonomous-e2e-smoke-artifacts
          path: artifacts/autonomous-e2e-smoke
          if-no-files-found: warn
          retention-days: 7
