name: Quality Gates

on:
  push:
  pull_request:

jobs:
  code-and-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Fast code quality lane
        run: make ci-fast
      - name: Docs-as-code sanity (markdown local links)
        run: make check-docs
